<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Inspection</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a00">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>


<body>

<h1>Vehicle Inspection</h1>

<div class="vehicle-box">

<label>Inspection Type</label>
<select id="inspectionType">
<option value="PRE">Pre Inspection</option>
<option value="POST">Post Inspection</option>
</select>

<label>Vehicle Registration</label>
<input id="reg" type="text">

<a href="https://vehicleenquiry.service.gov.uk/" target="_blank">
Check vehicle details
</a>

<label>Mileage</label>
<input id="mileage" type="number">

<label>Safe To Drive</label>
<select id="safeToDrive">
<option value="YES">YES</option>
<option value="NO">NO</option>
</select>

</div>

<div id="checklist"></div>

<h3>Photos</h3>
<input id="photoUpload" type="file" accept="image/*" multiple>

<h3>Notes</h3>
<textarea id="notes"></textarea>

<button onclick="exportPDF()">Export PDF</button>

<script src="app.js"></script>

</body>

</html>
